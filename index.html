<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ElectroHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #050510;
    color: white;
}

/* LOGIN PAGE */
#loginPage {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* LOGO */
.logo {
    width: 200px;
    margin-bottom: 20px;
}

/* INPUT */
input {
    padding: 10px;
    margin: 10px;
    width: 250px;
    border-radius: 8px;
}

/* BUTTON */
.btn {
    padding: 10px 20px;
    background: #00f0ff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* MAIN SITE */
#mainSite {
    display: none;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">

    <img src="logo.png" class="logo">

    <h2>Login / Sign Up</h2>

    <input type="text" id="userInput" placeholder="Enter Mobile or Email">

    <button class="btn" onclick="sendOTP()">Send OTP</button>

    <input type="text" id="otp" placeholder="Enter OTP">

    <button class="btn" onclick="login()">Login</button>

</div>

<!-- MAIN WEBSITE -->
<div id="mainSite">

    <h1 style="text-align:center;">ElectroHub</h1>

    <p style="text-align:center;">Welcome to your electronics store</p>

</div>

<script>
let generatedOTP = "";

/* FAKE OTP */
function sendOTP() {
    generatedOTP = Math.floor(1000 + Math.random() * 9000);
    alert("Your OTP is: " + generatedOTP); // simulation
}

function login() {
    let entered = document.getElementById("otp").value;

    if (entered == generatedOTP) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainSite").style.display = "block";
    } else {
        alert("Wrong OTP");
    }
}
</script>
<!-- Your website content above -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDVafLdrIxKuh808FoyL0sHGunCv2T_RI",
  authDomain: "electrohub-b4d78.firebaseapp.com",
  projectId: "electrohub-b4d78",
  storageBucket: "electrohub-b4d78.firebasestorage.app",
  messagingSenderId: "323473594100",
  appId: "1:323473594100:web:b4deec66f4171640d2b0a1"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function sendOTP() {
    let phone = document.getElementById("userInput").value;

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('loginPage', {
        size: 'invisible'
    });

    auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
    .then(function (confirmationResult) {
        window.confirmationResult = confirmationResult;
        alert("OTP Sent!");
    }).catch(function (error) {
        alert(error.message);
    });
}

function login() {
    let code = document.getElementById("otp").value;

    confirmationResult.confirm(code)
    .then(function () {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainSite").style.display = "block";
    }).catch(function () {
        alert("Wrong OTP");
    });
}
</script>

</body>
